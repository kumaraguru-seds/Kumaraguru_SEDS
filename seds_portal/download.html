            width: 100%; /* Fully responsive width matching system specifications */
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }

        .download-container h2 {

            padding: 12px;
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, box-shadow 0.3s;
            background-color: rgba(255, 255, 255, 0.1);
            width: 100%;
        }

        .download-btn svg {
            flex-shrink: 0;
        }

        .download-btn:hover {
            outline: none;
            background-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 10px var(--accent);
        }

        @media (max-width: 480px) {
            .download-container {
                padding: 30px 20px;
            }
            .download-container h2 {

            }
        }

        /* Stars Container */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff, 0 0 20px #fff;
            animation: fall linear infinite;
        }

        @keyframes fall {
            from {
                transform: translateY(-20px);
                opacity: 1;
            }
            to {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

<div class="music-wrapper" id="musicWrapper">

    </div>
    <div class="controls">

          <circle class="bg" cx="40" cy="40" r="34" />
          <circle class="progress" cx="40" cy="40" r="34" />
        </svg>
        <button id="playBtn" class="play-btn">
          <svg id="playIcon" viewBox="0 0 100 100">
            <polygon points="35,25 75,50 35,75"/>
          </svg>
          <svg id="pauseIcon" viewBox="0 0 100 100">
            <rect x="35" y="25" width="10" height="50"/>
            <rect x="55" y="25" width="10" height="50"/>
          </svg>
        </button>
      </div>
      <div class="volume">
        <svg viewBox="0 0 24 24">
          <path d="M3 9v6h4l5 4V5L7 9H3z"/>
        </svg>
        <input type="range" id="volume" min="0" max="1" step="0.01">
      </div>
    </div>
    <audio id="audio" src="../space.mp3"></audio>
  </div>

<script src="../load_player.js"></script>

<script>
    // Security Restrictions
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    document.addEventListener('dragstart', function(e) { e.preventDefault(); });
    document.addEventListener('keydown', function(e) {
        if (e.key === 'F12' || 
           (e.ctrlKey && e.shiftKey && ['I','i','C','c','J','j'].includes(e.key)) || 
           (e.ctrlKey && ['U','u'].includes(e.key))) {
            e.preventDefault();
        }
    });

    // Falling Stars Script
    document.addEventListener('DOMContentLoaded', () => {
        const starsContainer = document.querySelector('.stars-container');
        const numberOfStars = 200; 

        function createStar() {
            const star = document.createElement('div');
            star.classList.add('star');
            const size = Math.random() * 3 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.left = `${Math.random() * 100}%`;
            const duration = Math.random() * 5 + 3;
            const twinkleDuration = Math.random() * 2 + 1;
            star.style.animation = `
                fall ${duration}s linear infinite,
                twinkle ${twinkleDuration}s ease-in-out infinite
            `;
            starsContainer.appendChild(star);
        }

        for (let i = 0; i < numberOfStars; i++) {
            createStar();
        }
    });
</script>
