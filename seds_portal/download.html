            border: 1px solid var(--border-color);

        @keyframes fadeIn {

        }

        .download-options {

            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .download-btn {
            display: flex;
            align-items: center;

            gap: 12px;

            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            background: rgba(255, 255, 255, 0.05);
            width: 100%;
        }

        .download-btn svg {
            flex-shrink: 0;
        }

        .download-btn.android:hover {
            background: var(--android-green);
            color: #000;
            box-shadow: 0 0 15px rgba(61, 220, 132, 0.4);
            transform: translateY(-2px);
        }

        .download-btn.ios:hover {
            background: var(--apple-silver);
            color: #000;
            box-shadow: 0 0 15px rgba(245, 245, 247, 0.4);
            transform: translateY(-2px);
        }

        .download-btn.windows:hover {
            background: var(--windows-blue);
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 120, 212, 0.4);
            transform: translateY(-2px);

        @media (max-width: 480px) {

            }

        /* Stars Container */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff, 0 0 20px #fff;
            animation: fall linear infinite;
        }

        @keyframes fall {
            from {
                transform: translateY(-20px);
                opacity: 1;
            }
            to {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

<script>
    // Security Restrictions
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    document.addEventListener('dragstart', function(e) { e.preventDefault(); });
    document.addEventListener('keydown', function(e) {
        if (e.key === 'F12' || 
           (e.ctrlKey && e.shiftKey && ['I','i','C','c','J','j'].includes(e.key)) || 
           (e.ctrlKey && ['U','u'].includes(e.key))) {
            e.preventDefault();
        }
    });

    // Falling Stars Script
    document.addEventListener('DOMContentLoaded', () => {
        const starsContainer = document.querySelector('.stars-container');
        const numberOfStars = 200; 

        function createStar() {
            const star = document.createElement('div');
            star.classList.add('star');
            const size = Math.random() * 3 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.left = `${Math.random() * 100}%`;
            const duration = Math.random() * 5 + 3;
            const twinkleDuration = Math.random() * 2 + 1;
            star.style.animation = `
                fall ${duration}s linear infinite,
                twinkle ${twinkleDuration}s ease-in-out infinite
            `;
            starsContainer.appendChild(star);
        }

        for (let i = 0; i < numberOfStars; i++) {
            createStar();
        }
    });
</script>
